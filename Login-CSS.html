<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f1117;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #e2e8f0;
  }

  .login-bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(139,92,246,.1) 0%, transparent 50%);
    pointer-events: none;
  }

  .login-card {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: #1a1d27;
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 16px;
    padding: 40px 36px;
    box-shadow: 0 25px 50px rgba(0,0,0,.5);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .login-logo h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.02em;
  }
  .login-logo p {
    font-size: .85rem;
    color: #64748b;
    margin-top: 4px;
  }
  .login-logo .icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg,#6366f1,#8b5cf6);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    font-size: 1.4rem;
  }

  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: .8rem;
    font-weight: 500;
    color: #94a3b8;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap input {
    width: 100%;
    background: #0f1117;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px;
    padding: 12px 44px 12px 14px;
    color: #e2e8f0;
    font-size: .95rem;
    outline: none;
    transition: border-color .2s;
  }
  .input-wrap input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }
  .input-wrap input::placeholder { color: #475569; }
  .toggle-senha {
    position: absolute;
    right: 13px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: #64748b; cursor: pointer;
    font-size: .95rem;
    padding: 2px;
    transition: color .2s;
  }
  .toggle-senha:hover { color: #94a3b8; }

  .btn-entrar {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg,#6366f1,#8b5cf6);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s, transform .1s;
    letter-spacing: .01em;
  }
  .btn-entrar:hover:not(:disabled) { opacity: .9; }
  .btn-entrar:active:not(:disabled) { transform: scale(.99); }
  .btn-entrar:disabled { opacity: .5; cursor: not-allowed; }

  .msg-erro {
    display: none;
    background: rgba(239,68,68,.12);
    border: 1px solid rgba(239,68,68,.3);
    color: #fca5a5;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: .875rem;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .msg-sucesso {
    display: none;
    background: rgba(34,197,94,.12);
    border: 1px solid rgba(34,197,94,.3);
    color: #86efac;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: .875rem;
    margin-bottom: 16px;
  }

  .link-reset {
    text-align: center;
    margin-top: 18px;
  }
  .link-reset a {
    color: #6366f1;
    font-size: .875rem;
    text-decoration: none;
    cursor: pointer;
    transition: color .2s;
  }
  .link-reset a:hover { color: #818cf8; text-decoration: underline; }

  /* Painel de reset */
  .painel-reset { display: none; }
  .btn-voltar {
    background: none; border: none;
    color: #6366f1; cursor: pointer;
    font-size: .875rem;
    padding: 0;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color .2s;
  }
  .btn-voltar:hover { color: #818cf8; }

  /* Painel de nova senha */
  .painel-nova-senha { display: none; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 460px) {
    .login-card { margin: 16px; padding: 28px 20px; }
  }
</style>
