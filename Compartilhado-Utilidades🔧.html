<script>
  /* ========================================================================
   * COMPARTILHADO-UTILIDADES🔧
   * Sessão, autenticação e utilitários de data — usados por todas as páginas.
   * Cada página deve definir SESSAO_TOKEN, USUARIO_NOME e USUARIO_PERFIL
   * antes de incluir este arquivo.
   * ======================================================================== */

  // ── Sessão (preenchidos via template em cada página) ──────────────────────
  // Exemplo em cada página:
  //   var SESSAO_TOKEN   = '<?= sessaoToken ?>';
  //   var USUARIO_NOME   = '<?= usuarioNome ?>';
  //   var USUARIO_PERFIL = '<?= usuarioPerfil ?>';

  // ── Perfis disponíveis ────────────────────────────────────────────────────
  var PERFIS = { ADMIN: 'admin', USUARIO: 'usuario', VISUALIZADOR: 'visualizador' };

  // ── Verifica sessão no cliente e executa callback se válida ───────────────
  // callbackSucesso(usuario) é chamado quando a sessão é válida.
  // Em caso de sessão inválida, redireciona para login automaticamente.
  function verificarSessaoCliente(callbackSucesso) {
    if (typeof SESSAO_TOKEN === 'undefined' || !SESSAO_TOKEN) {
      _redirecionarLogin();
      return;
    }
    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.valida) {
          if (typeof callbackSucesso === 'function') callbackSucesso(r.usuario);
        } else {
          _redirecionarLogin();
        }
      })
      .withFailureHandler(function() { _redirecionarLogin(); })
      .verificarSessao(SESSAO_TOKEN);
  }

  // ── Logout ────────────────────────────────────────────────────────────────
  function fazerLogoutCliente() {
    if (typeof SESSAO_TOKEN !== 'undefined' && SESSAO_TOKEN) {
      google.script.run.fazerLogout(SESSAO_TOKEN);
    }
    sessionStorage.removeItem('sm_token');
    sessionStorage.removeItem('sm_usuario');
    _redirecionarLogin();
  }

  // ── Helpers internos ──────────────────────────────────────────────────────
  function _redirecionarLogin() {
    google.script.run.withSuccessHandler(function(url) {
      window.location.href = url + '?pagina=login';
    }).obterUrlWebApp();
  }

  function podeEditar() {
    return typeof USUARIO_PERFIL !== 'undefined' &&
           (USUARIO_PERFIL === PERFIS.ADMIN || USUARIO_PERFIL === PERFIS.USUARIO);
  }

  function ehAdmin() {
    return typeof USUARIO_PERFIL !== 'undefined' && USUARIO_PERFIL === PERFIS.ADMIN;
  }

  // ── Utilitários de data ───────────────────────────────────────────────────

  /**
   * Formata uma data ou string de data no padrão dd/mm/aaaa.
   * @param {Date|string|null} valor
   * @returns {string}
   */
  function formatarDataBR(valor) {
    if (!valor) return '';
    var d = (valor instanceof Date) ? valor : new Date(valor);
    if (isNaN(d.getTime())) return '';
    var dia  = String(d.getDate()).padStart(2, '0');
    var mes  = String(d.getMonth() + 1).padStart(2, '0');
    var ano  = d.getFullYear();
    return dia + '/' + mes + '/' + ano;
  }

  /**
   * Retorna a data atual no formato ISO (aaaa-mm-dd), usando fuso de São Paulo.
   * @returns {string}
   */
  function obterDataAtualISO() {
    var agora = new Date();
    var ano  = agora.getFullYear();
    var mes  = String(agora.getMonth() + 1).padStart(2, '0');
    var dia  = String(agora.getDate()).padStart(2, '0');
    return ano + '-' + mes + '-' + dia;
  }

  /**
   * Calcula diferença em dias entre duas datas (ou strings de data).
   * @param {Date|string} inicio
   * @param {Date|string} fim
   * @returns {number} dias (negativo se fim < inicio)
   */
  function calcularDiasEntreDatas(inicio, fim) {
    var dInicio = (inicio instanceof Date) ? inicio : new Date(inicio);
    var dFim    = (fim    instanceof Date) ? fim    : new Date(fim);
    if (isNaN(dInicio.getTime()) || isNaN(dFim.getTime())) return 0;
    return Math.round((dFim - dInicio) / (1000 * 60 * 60 * 24));
  }
</script>
