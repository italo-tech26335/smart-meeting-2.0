<script>
/* ====================================================================
 * PaginaAdmin-JS.html
 * JavaScript do painel de administração — Smart Meeting 2.0
 * ==================================================================== */

// ── Inicialização ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var elNome = document.getElementById('admNomeUsuario');
  if (elNome && typeof USUARIO_NOME !== 'undefined') elNome.textContent = USUARIO_NOME;

  verificarSessaoCliente(function() {
    // Carrega departamentos primeiro (necessário para exibir nomes na tabela de usuários)
    google.script.run
      .withSuccessHandler(function(r) {
        _todosDepartamentos = (r && r.departamentos) ? r.departamentos : [];
        carregarUsuarios();
      })
      .withFailureHandler(function() { carregarUsuarios(); })
      .listarDepartamentos(SESSAO_TOKEN);
  });
});

// ── Estado global ─────────────────────────────────────────────────────
var _todosDepartamentos = [];
var _mapaUsuarios = {};
var _mapaDepartamentos = {};

// ── Navegação entre seções ────────────────────────────────────────────
function mostrarSecao(id) {
  document.querySelectorAll('.adm-secao').forEach(function(s) { s.classList.remove('ativa'); });
  document.querySelectorAll('.adm-nav a').forEach(function(a) { a.classList.remove('ativo'); });
  var sec = document.getElementById(id);
  if (sec) sec.classList.add('ativa');

  var tabMap = { secUsuarios: 'tabUsuarios', secDepartamentos: 'tabDepartamentos', secLogs: 'tabLogs' };
  var tab = document.getElementById(tabMap[id]);
  if (tab) tab.classList.add('ativo');

  if (id === 'secLogs') carregarLogs();
  if (id === 'secDepartamentos') carregarDepartamentos();
}

// ── Carregar usuários ─────────────────────────────────────────────────
function carregarUsuarios() {
  var tbody = document.getElementById('tbodyUsuarios');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#475569;"><span class="spinner-inline"></span> Carregando...</td></tr>';

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.sucesso) { toast(r.mensagem || 'Erro ao carregar', 'err'); return; }
      _renderizarUsuarios(r.usuarios || []);
      _atualizarMetricas(r.usuarios || []);
    })
    .withFailureHandler(function(e) { toast('Erro: ' + e.message, 'err'); })
    .listarUsuarios(SESSAO_TOKEN);
}

function _renderizarUsuarios(lista) {
  var tbody = document.getElementById('tbodyUsuarios');
  if (lista.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fas fa-users"></i><p>Nenhum usuário cadastrado</p></div></td></tr>';
    return;
  }

  _mapaUsuarios = {};
  var html = lista.map(function(u) {
    _mapaUsuarios[u.id] = u;
    var perfilBadge = {
      admin:        '<span class="badge badge-admin">Admin</span>',
      usuario:      '<span class="badge badge-usuario">Usuário</span>',
      visualizador: '<span class="badge badge-viz">Visualizador</span>'
    }[u.perfil] || '<span class="badge">' + _esc(u.perfil) + '</span>';

    var statusBadge = u.bloqueado
      ? '<span class="badge badge-bloq"><i class="fas fa-lock"></i> Bloqueado</span>'
      : u.primeiroAcesso
        ? '<span class="badge badge-inativo"><i class="fas fa-hourglass-half"></i> Aguardando ativação</span>'
        : u.ativo
          ? '<span class="badge badge-ativo">Ativo</span>'
          : '<span class="badge badge-inativo">Inativo</span>';

    var ultimoLogin = u.ultimoLogin || '—';
    var depNomes = (u.departamentosIds || []).map(function(depId) {
      var dep = _todosDepartamentos.find(function(d) { return d.id === depId; });
      return dep ? dep.nome : depId;
    }).join(', ') || '—';

    // Badges de páginas permitidas
    var PAGINAS_INFO = { reunioes: { label: 'Reuniões', icon: 'fa-video' }, projeto: { label: 'Projetos', icon: 'fa-folder' }, relatorios: { label: 'Relatórios', icon: 'fa-chart-bar' } };
    var paginasBadges;
    if (u.perfil === 'admin') {
      paginasBadges = '<span style="font-size:.72rem;color:var(--cor-aviso);font-weight:600;"><i class="fas fa-shield-alt"></i> Tudo</span>';
    } else {
      var pags = u.paginasPermitidas || [];
      if (pags.length === 0) {
        paginasBadges = '<span style="font-size:.72rem;color:var(--cor-primaria);">Todas</span>';
      } else {
        paginasBadges = pags.map(function(p) {
          var info = PAGINAS_INFO[p];
          return info ? '<span style="font-size:.7rem;background:var(--cor-destaque-bg);color:var(--cor-destaque);border-radius:12px;padding:2px 8px;font-weight:600;white-space:nowrap;"><i class="fas ' + info.icon + '" style="font-size:.65rem;"></i> ' + info.label + '</span>' : '';
        }).filter(Boolean).join(' ');
      }
    }

    return '<tr>'
      + '<td><div style="font-weight:600;">' + _esc(u.nome) + '</div><div style="color:var(--cor-primaria);font-size:.78rem;">' + _esc(u.email) + '</div><div style="color:var(--cor-primaria);font-size:.75rem;margin-top:2px;"><i class="fas fa-building" style="font-size:.7rem;"></i> ' + _esc(depNomes) + '</div></td>'
      + '<td>' + perfilBadge + '</td>'
      + '<td>' + paginasBadges + '</td>'
      + '<td>' + statusBadge + '</td>'
      + '<td style="color:#64748b;">' + ultimoLogin + '</td>'
      + '<td>'
      + '<button class="btn btn-ghost btn-sm" onclick="abrirModalEditarUsuario(_mapaUsuarios[\'' + u.id + '\'])" title="Editar"><i class="fas fa-edit"></i></button> '
      + (u.bloqueado ? '<button class="btn btn-ghost btn-sm" onclick="desbloquear(\'' + _esc(u.id) + '\')" title="Desbloquear"><i class="fas fa-unlock"></i></button> ' : '')
      + '<button class="btn btn-ghost btn-sm" onclick="resetarSenhaAdmin(\'' + _esc(u.id) + '\')" title="Resetar senha"><i class="fas fa-key"></i></button>'
      + '</td>'
      + '</tr>';
  }).join('');

  tbody.innerHTML = html;
}

function _atualizarMetricas(lista) {
  var total  = lista.length;
  var ativos = lista.filter(function(u) { return u.ativo && !u.bloqueado; }).length;
  var bloq   = lista.filter(function(u) { return u.bloqueado; }).length;
  var admins = lista.filter(function(u) { return u.perfil === 'admin'; }).length;

  _txt('metTotal',  total);
  _txt('metAtivos', ativos);
  _txt('metBloq',   bloq);
  _txt('metAdmin',  admins);
}

// ── Carregar logs ─────────────────────────────────────────────────────
function carregarLogs() {
  var tbody = document.getElementById('tbodyLogs');
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:#475569;"><span class="spinner-inline"></span> Carregando...</td></tr>';

  var filtros = {
    evento:  document.getElementById('filtroEvento').value,
    usuario: document.getElementById('filtroUsuarioLog').value.trim()
  };

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.sucesso) { toast(r.mensagem || 'Erro ao carregar', 'err'); return; }
      _renderizarLogs(r.logs || []);
    })
    .withFailureHandler(function(e) { toast('Erro: ' + e.message, 'err'); })
    .obterLogs(SESSAO_TOKEN, filtros);
}

function _renderizarLogs(lista) {
  var tbody = document.getElementById('tbodyLogs');
  if (lista.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="fas fa-scroll"></i><p>Nenhum log encontrado</p></div></td></tr>';
    return;
  }

  var corEvento = {
    login_sucesso:    '#3a6030',
    login_falha:      '#8b2e2e',
    logout:           '#8b6347',
    reset_senha:      '#a06820',
    acesso_negado:    '#8b2e2e',
    sessao_expirada:  '#8b6347',
    usuario_bloqueado:'#a06820'
  };

  var html = lista.map(function(log) {
    var ts = log.timestamp || '—';
    var cor = corEvento[log.evento] || '#8b6347';
    return '<tr>'
      + '<td style="color:var(--cor-primaria);font-size:.78rem;white-space:nowrap;">' + _esc(ts) + '</td>'
      + '<td><span style="color:' + cor + ';font-size:.78rem;font-weight:600;">' + _esc(log.evento || '') + '</span></td>'
      + '<td style="font-size:.82rem;">' + _esc(log.usuario || '—') + '</td>'
      + '<td style="color:var(--cor-primaria);font-size:.78rem;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + _esc(log.detalhes || '') + '">' + _esc(log.detalhes || '—') + '</td>'
      + '<td><span style="font-size:.75rem;color:' + (log.resultado === 'sucesso' ? '#3a6030' : '#8b2e2e') + ';">' + _esc(log.resultado || '') + '</span></td>'
      + '</tr>';
  }).join('');

  tbody.innerHTML = html;
}

// ── Departamentos ──────────────────────────────────────────────────────
function carregarDepartamentos() {
  var tbody = document.getElementById('tbodyDepartamentos');
  tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:32px;"><span class="spinner-inline"></span> Carregando...</td></tr>';

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.sucesso) { toast(r.mensagem || 'Erro ao carregar', 'err'); return; }
      _todosDepartamentos = r.departamentos || [];
      _renderizarDepartamentos(_todosDepartamentos);
    })
    .withFailureHandler(function(e) { toast('Erro: ' + e.message, 'err'); })
    .listarDepartamentos(SESSAO_TOKEN);
}

function _renderizarDepartamentos(lista) {
  var tbody = document.getElementById('tbodyDepartamentos');
  if (lista.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><i class="fas fa-building"></i><p>Nenhum departamento cadastrado</p></div></td></tr>';
    return;
  }
  _mapaDepartamentos = {};
  var html = lista.map(function(d) {
    _mapaDepartamentos[d.id] = d;
    return '<tr>'
      + '<td style="font-weight:600;">' + _esc(d.nome) + '</td>'
      + '<td style="color:var(--cor-primaria);">' + _esc(d.descricao || '—') + '</td>'
      + '<td>'
      + '<button class="btn btn-ghost btn-sm" onclick="abrirModalEditarDepartamento(_mapaDepartamentos[\'' + d.id + '\'])" title="Editar"><i class="fas fa-edit"></i></button> '
      + '<button class="btn btn-danger btn-sm" onclick="removerDepartamento(\'' + d.id + '\')" title="Remover"><i class="fas fa-trash"></i></button>'
      + '</td>'
      + '</tr>';
  }).join('');
  tbody.innerHTML = html;
}

function abrirModalNovoDepartamento() {
  _txt('modalDepTitulo', 'Novo Departamento');
  _val('editDepId', '');
  _val('editDepNome', '');
  _val('editDepDescricao', '');
  document.getElementById('modalDepartamento').classList.add('aberto');
}

function abrirModalEditarDepartamento(d) {
  _txt('modalDepTitulo', 'Editar Departamento');
  _val('editDepId', d.id);
  _val('editDepNome', d.nome);
  _val('editDepDescricao', d.descricao || '');
  document.getElementById('modalDepartamento').classList.add('aberto');
}

function fecharModalDepartamento() {
  document.getElementById('modalDepartamento').classList.remove('aberto');
}

function salvarDepartamento() {
  var id   = document.getElementById('editDepId').value;
  var nome = document.getElementById('editDepNome').value.trim();
  var desc = document.getElementById('editDepDescricao').value.trim();
  if (!nome) { toast('Nome obrigatório', 'err'); return; }

  var btn = document.getElementById('btnSalvarDepartamento');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span> Salvando...';

  var fn = id ? 'atualizarDepartamento' : 'criarDepartamento';
  var dadosDep = id ? { id: id, nome: nome, descricao: desc } : { nome: nome, descricao: desc };

  google.script.run
    .withSuccessHandler(function(r) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save"></i> Salvar';
      if (r.sucesso) {
        toast(r.mensagem || 'Salvo!', 'ok');
        fecharModalDepartamento();
        carregarDepartamentos();
      } else {
        toast(r.mensagem || 'Erro', 'err');
      }
    })
    .withFailureHandler(function(e) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save"></i> Salvar';
      toast('Erro: ' + e.message, 'err');
    })
    [fn](SESSAO_TOKEN, dadosDep);
}

function removerDepartamento(id) {
  if (!confirm('Remover este departamento? Esta ação não pode ser desfeita.')) return;
  google.script.run
    .withSuccessHandler(function(r) {
      toast(r.sucesso ? 'Departamento removido!' : (r.mensagem || 'Erro'), r.sucesso ? 'ok' : 'err');
      if (r.sucesso) carregarDepartamentos();
    })
    .withFailureHandler(function(e) { toast('Erro: ' + e.message, 'err'); })
    .removerDepartamento(SESSAO_TOKEN, id);
}

function _carregarDepsParaModal(depsSelecionadas) {
  var container = document.getElementById('listaDepartamentosUsuario');
  if (!container) return;
  if (_todosDepartamentos.length === 0) {
    // Carrega da API se ainda não tiver
    google.script.run
      .withSuccessHandler(function(r) {
        _todosDepartamentos = (r && r.departamentos) ? r.departamentos : [];
        _renderizarChecksDeps(container, depsSelecionadas);
      })
      .withFailureHandler(function() { container.innerHTML = '<span style="color:var(--cor-primaria);">Não foi possível carregar</span>'; })
      .listarDepartamentos(SESSAO_TOKEN);
  } else {
    _renderizarChecksDeps(container, depsSelecionadas);
  }
}

function _renderizarChecksDeps(container, depsSelecionadas) {
  var sels = depsSelecionadas || [];
  if (_todosDepartamentos.length === 0) {
    container.innerHTML = '<span style="color:var(--cor-primaria);font-size:.82rem;">Nenhum departamento cadastrado</span>';
    return;
  }
  container.innerHTML = _todosDepartamentos.map(function(d) {
    var checked = sels.includes(d.id) ? 'checked' : '';
    return '<label style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--cor-borda);border-radius:20px;cursor:pointer;font-size:.82rem;background:var(--cor-fundo-card);">'
      + '<input type="checkbox" value="' + _esc(d.id) + '" ' + checked + ' style="accent-color:var(--cor-destaque);">'
      + ' ' + _esc(d.nome)
      + '</label>';
  }).join('');
}

// ── Modal novo usuário ────────────────────────────────────────────────
function _definirPaginasModal(paginasPermitidas) {
  var pags = paginasPermitidas || [];
  // Se vazio = sem restrição = marca tudo
  var marcaTudo = pags.length === 0;
  document.getElementById('pagReuniao').checked   = marcaTudo || pags.includes('reunioes');
  document.getElementById('pagProjeto').checked   = marcaTudo || pags.includes('projeto');
  document.getElementById('pagRelatorio').checked = marcaTudo || pags.includes('relatorios');
}

function abrirModalNovoUsuario() {
  _txt('modalUsuarioTitulo', 'Novo Usuário');
  _val('editUserId', '');
  _val('editNome', '');
  _val('editEmail', '');
  _val('editPerfil', 'usuario');
  document.getElementById('campoStatusModal').style.display = 'none';
  document.getElementById('campoSenhaModal').style.display = '';
  document.getElementById('senhaGerada').style.display = 'none';
  document.getElementById('editEmail').readOnly = false;
  _definirPaginasModal([]);
  _carregarDepsParaModal([]);
  document.getElementById('modalUsuario').classList.add('aberto');
}

function abrirModalEditarUsuario(u) {
  _txt('modalUsuarioTitulo', 'Editar Usuário');
  _val('editUserId', u.id);
  _val('editNome', u.nome);
  _val('editEmail', u.email);
  _val('editPerfil', u.perfil);
  _val('editAtivo', u.ativo ? 'true' : 'false');
  document.getElementById('campoStatusModal').style.display = '';
  document.getElementById('campoSenhaModal').style.display = 'none';
  document.getElementById('senhaGerada').style.display = 'none';
  document.getElementById('editEmail').readOnly = true;
  _definirPaginasModal(u.paginasPermitidas || []);
  _carregarDepsParaModal(u.departamentosIds || []);
  document.getElementById('modalUsuario').classList.add('aberto');
}

function fecharModalUsuario() {
  document.getElementById('modalUsuario').classList.remove('aberto');
}

function salvarUsuario() {
  var id   = document.getElementById('editUserId').value;
  var nome = document.getElementById('editNome').value.trim();
  var email = document.getElementById('editEmail').value.trim();
  var perfil = document.getElementById('editPerfil').value;

  if (!nome || !email) { toast('Nome e email são obrigatórios', 'err'); return; }

  var btn = document.getElementById('btnSalvarUsuario');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span> Salvando...';

  // Coletar departamentos selecionados
  var depChecks = document.querySelectorAll('#listaDepartamentosUsuario input[type="checkbox"]:checked');
  var depIds = Array.prototype.map.call(depChecks, function(c) { return c.value; });

  // Coletar páginas selecionadas
  var pagIds = [];
  ['pagReuniao', 'pagProjeto', 'pagRelatorio'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.checked) pagIds.push(el.value);
  });
  // Se marcou tudo, salva vazio (sem restrição) para manter compatibilidade
  var todasPags = ['reunioes', 'projeto', 'relatorios'];
  var paginasPermitidas = pagIds.length === todasPags.length ? [] : pagIds;

  if (!id) {
    // Criar novo usuário (sem senha — usuário definirá PIN no primeiro acesso)
    var dados = { nome: nome, email: email, perfil: perfil, departamentosIds: depIds, paginasPermitidas: paginasPermitidas };

    google.script.run
      .withSuccessHandler(function(r) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Salvar';
        if (r.sucesso) {
          toast(r.mensagem || 'Usuário criado! Ele definirá o PIN no primeiro acesso.', 'ok');
          fecharModalUsuario();
          carregarUsuarios();
        } else {
          toast(r.mensagem || 'Erro ao criar', 'err');
        }
      })
      .withFailureHandler(function(e) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Salvar';
        toast('Erro: ' + e.message, 'err');
      })
      .criarUsuario(SESSAO_TOKEN, dados);
  } else {
    // Atualizar usuário existente
    var ativo = document.getElementById('editAtivo').value === 'true';
    var dadosUpd = { id: id, nome: nome, perfil: perfil, ativo: ativo, departamentosIds: depIds, paginasPermitidas: paginasPermitidas };

    google.script.run
      .withSuccessHandler(function(r) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Salvar';
        if (r.sucesso) {
          toast(r.mensagem || 'Atualizado!', 'ok');
          fecharModalUsuario();
          carregarUsuarios();
        } else {
          toast(r.mensagem || 'Erro ao atualizar', 'err');
        }
      })
      .withFailureHandler(function(e) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Salvar';
        toast('Erro: ' + e.message, 'err');
      })
      .atualizarUsuario(SESSAO_TOKEN, dadosUpd);
  }
}

// ── Desbloquear usuário ────────────────────────────────────────────────
function desbloquear(userId) {
  google.script.run
    .withSuccessHandler(function(r) {
      toast(r.sucesso ? 'Usuário desbloqueado!' : (r.mensagem || 'Erro'), r.sucesso ? 'ok' : 'err');
      if (r.sucesso) carregarUsuarios();
    })
    .withFailureHandler(function(e) { toast('Erro: ' + e.message, 'err'); })
    .desbloquearUsuario(SESSAO_TOKEN, userId);
}

// ── Resetar senha (admin) ──────────────────────────────────────────────
function resetarSenhaAdmin(userId) {
  if (!confirm('Resetar o PIN deste usuário? O usuário deverá criar um novo PIN no próximo acesso.')) return;

  google.script.run
    .withSuccessHandler(function(r) {
      if (r.sucesso) {
        toast('PIN resetado! O usuário criará um novo PIN no próximo acesso.', 'ok');
        carregarUsuarios();
      } else {
        toast(r.mensagem || 'Erro ao resetar', 'err');
      }
    })
    .withFailureHandler(function(e) { toast('Erro: ' + e.message, 'err'); })
    .resetarSenhaAdmin(SESSAO_TOKEN, userId);
}

// ── Utilitários ────────────────────────────────────────────────────────
function toast(msg, tipo) {
  var box = document.getElementById('toastAdmin');
  var div = document.createElement('div');
  div.className = 'toast-adm ' + (tipo === 'ok' ? 'toast-ok' : 'toast-err');
  div.textContent = msg;
  box.appendChild(div);
  setTimeout(function() { div.remove(); }, 4500);
}

function _esc(s) {
  var d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

function _val(id, v) {
  var el = document.getElementById(id);
  if (el) el.value = v;
}

function _txt(id, v) {
  var el = document.getElementById(id);
  if (el) el.textContent = v;
}
</script>
