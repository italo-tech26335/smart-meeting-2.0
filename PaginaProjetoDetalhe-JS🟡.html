function _docsViewerMostrar(qual) {
  var ids = ['docsDriveViewerPlaceholder', 'docsDriveEditorContainer', 'docsDriveImagemContainer', 'docsDriveIframeContainer'];
  ids.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  var alvo = {
    placeholder: 'docsDriveViewerPlaceholder',
    editor:      'docsDriveEditorContainer',
    imagem:      'docsDriveImagemContainer',
    iframe:      'docsDriveIframeContainer'
  }[qual];
  if (alvo) document.getElementById(alvo).style.display = '';
}

function _docsEscapeHtml(texto) {
  return String(texto || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function _docsTextoParaHtmlEditavel(texto) {
  var linhas = _docsEscapeHtml(texto).split(/\r?\n/);
  var html = linhas.map(function(linha) {
    return linha ? '<p>' + linha + '</p>' : '<p><br></p>';
  }).join('');
  return html || '<p><br></p>';
}

function _docsExtrairHtmlEditavel(conteudoHtml) {
  var html = String(conteudoHtml || '').trim();
  if (!html) return '<p><br></p>';

  try {
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    var temDocumentoCompleto = /<!doctype|<html[\s>]|<head[\s>]|<body[\s>]/i.test(html);
    var baseHtml = temDocumentoCompleto && doc.body ? doc.body.innerHTML : html;
    var container = document.createElement('div');

    container.innerHTML = baseHtml;
    container.querySelectorAll('style,script,link,meta,title,base').forEach(function(no) {
      no.remove();
    });

    return (container.innerHTML || '').trim() || '<p><br></p>';
  } catch (e) {
    return html
      .replace(/<style\b[^>]*>[\s\S]*?<\/style>/gi, '')
      .replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, '')
      .trim() || '<p><br></p>';
  }
}

function _docsLimparEditorArea() {
  var area = document.getElementById('docsDriveEditorArea');
  if (area) area.innerHTML = '<p><br></p>';
}

function visualizarDocumentoDrive(fileId, nome, mimeType) {
  document.querySelectorAll('.drive-doc-item').forEach(function(el) { el.classList.remove('ativo'); });
  var item = document.getElementById('driveDocItem_' + fileId);
  if (item) item.classList.add('ativo');

  _docsDriveFileEditId = null;

  mostrarProcessando('Carregando documento...');
  google.script.run
    .withSuccessHandler(function(res) {
      esconderProcessando();
      if (!res.sucesso) { mostrarToast('Erro: ' + res.mensagem, 'erro'); return; }

      if (res.tipo === 'texto') {
        _docsDriveFileEditId = fileId;
        var nomeBase = nome.replace(/\.(html|txt)$/i, '');
        document.getElementById('docsDriveEditorNome').value = nomeBase;
        // HTML files → load as innerHTML; plain text → wrap in <p>
        var isHtml = (mimeType === 'text/html' || nome.match(/\.html?$/i));
        var area = document.getElementById('docsDriveEditorArea');
        area.innerHTML = isHtml
          ? _docsExtrairHtmlEditavel(res.conteudo)
          : _docsTextoParaHtmlEditavel(res.conteudo);
        _docsViewerMostrar('editor');
        docsAtualizarToolbar();
      } else if (res.tipo === 'imagem') {
        document.getElementById('docsDriveImagemNome').textContent = nome;
        document.getElementById('docsDriveImagemEl').src = res.conteudo;
        _docsViewerMostrar('imagem');
      } else {
        document.getElementById('docsDriveIframeNome').textContent = nome;
        document.getElementById('docsDriveIframeEl').src = res.url;
        _docsViewerMostrar('iframe');
      }
    })
    .withFailureHandler(function(e) {
      esconderProcessando();
      mostrarToast('Erro ao carregar: ' + e, 'erro');
    })
    .obterConteudoDocumentoDrive(SESSAO_TOKEN, fileId);
}

function salvarDocumentoTexto() {
  var nome     = (document.getElementById('docsDriveEditorNome').value || '').trim();
  var area     = document.getElementById('docsDriveEditorArea');
  // Embalar o HTML num template completo com estilos básicos para preservar formatação
  var conteudo = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' +
    'body{font-family:Arial,sans-serif;font-size:12pt;line-height:1.6;color:#1a1a1a;max-width:780px;margin:40px auto;padding:0 24px;}' +
    'h1{font-size:2em;margin:.67em 0}h2{font-size:1.5em}h3{font-size:1.17em}h4{font-size:1em}' +
    'blockquote{border-left:4px solid #ccc;margin:1em 0;padding:.5em 1em;color:#555;background:#f9f9f9;}' +
    'pre{background:#f4f4f4;padding:12px;border-radius:4px;overflow-x:auto;font-family:monospace;}' +
    'table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:8px 12px;}' +
    '</style></head><body>' + area.innerHTML + '</body></html>';

  if (!nome) { mostrarToast('Informe um nome para o documento.', 'aviso'); return; }

  mostrarProcessando('Salvando...');

  if (_docsDriveFileEditId) {
    var fileId   = _docsDriveFileEditId;
    var nomeHtml = nome.endsWith('.html') ? nome : nome + '.html';
    google.script.run
      .withSuccessHandler(function(res) {
        esconderProcessando();
        if (res.sucesso) {
          mostrarToast('Documento salvo!', 'sucesso');
          var arquivoAtual = _docsDriveArquivos.find(function(a) { return a.id === fileId; });
          var nomeAtual    = arquivoAtual ? arquivoAtual.nome : '';
          if (nomeHtml !== nomeAtual) {
            google.script.run
              .withSuccessHandler(function() { _docsCarregarLista(); })
              .renomearDocumentoDrive(SESSAO_TOKEN, fileId, nomeHtml);
          } else {
            _docsCarregarLista();
          }
        } else {
          mostrarToast('Erro: ' + res.mensagem, 'erro');
        }
      })
      .withFailureHandler(function(e) { esconderProcessando(); mostrarToast('Erro: ' + e, 'erro'); })
      .atualizarTextoNaDrive(SESSAO_TOKEN, fileId, conteudo);
  } else {
    // Criar novo
    google.script.run
      .withSuccessHandler(function(res) {
        esconderProcessando();
        if (res.sucesso) {
          mostrarToast('Documento criado!', 'sucesso');
          _docsDriveFileEditId = res.arquivo.id;
          _docsCarregarLista();
        } else {
          mostrarToast('Erro: ' + res.mensagem, 'erro');
        }
      })
      .withFailureHandler(function(e) { esconderProcessando(); mostrarToast('Erro: ' + e, 'erro'); })
      .salvarTextoNaDrive(SESSAO_TOKEN, _docsDriveProjetoId, nome + '.html', conteudo, 'text/html');
  }
}

function _docsEditorEl() { return document.getElementById('docsDriveEditorArea'); }

function docCmd(command) {

function docAplicarTamanho(px) {
  // execCommand fontSize usa escala 1-7; usamos inline style para tamanho em pt
  var sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return;
  var range = sel.getRangeAt(0);
  if (range.collapsed) return;
  var span = document.createElement('span');
  span.style.fontSize = px + 'pt';
  try { range.surroundContents(span); } catch(e) {
    document.execCommand('fontSize', false, '3'); // fallback
  }
  docsAtualizarToolbar();
}

function docInserirLinha() {
  _docsEditorEl().focus();
  document.execCommand('insertHorizontalRule', false, null);
}

function docInserirLink() {
  var url = prompt('URL do link (ex: https://exemplo.com):', 'https://');
  if (url && url !== 'https://') {
    _docsEditorEl().focus();
    document.execCommand('createLink', false, url);
  }
}

function docInserirTabela() {
  var html = '<table><tr><th>Coluna 1</th><th>Coluna 2</th><th>Coluna 3</th></tr>' +
             '<tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>' +
             '<tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr></table><p><br></p>';
  _docsEditorEl().focus();
  document.execCommand('insertHTML', false, html);

function docsEditorKeydown(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;');
  }
  // Ctrl+S → salvar
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    salvarDocumentoTexto();
  }
}

function docsAtualizarToolbar() {
  // Botões toggle (bold, italic, etc.)
  ['bold','italic','underline','strikeThrough',
   'justifyLeft','justifyCenter','justifyRight','justifyFull',
   'insertUnorderedList','insertOrderedList'].forEach(function(cmd) {
    var btn = document.querySelector('#docsEditorToolbar [data-cmd="' + cmd + '"]');
    if (btn) {
      try { btn.classList.toggle('ativo', document.queryCommandState(cmd)); } catch(e) {}
    }
  });
  // Block format select
  var blockSel = document.getElementById('docsBlockFormat');
  if (blockSel) {
    try {
      var val = document.queryCommandValue('formatBlock').toLowerCase().replace(/^<|>$/g, '');
      blockSel.value = val || 'p';
    } catch(e) {}
  }
}

// ── Upload de arquivo ─────────────────────────────────────────────────────────

var _UPLOAD_CHUNK_SIZE = 4 * 1024 * 1024; // 4 MB por chunk

function processarUploadDrive(projetoId, input) {
  var file = input.files[0];
  if (!file) return;

  var MAX_SIZE = 100 * 1024 * 1024; // 100 MB
  if (file.size > MAX_SIZE) {
    mostrarToast('Arquivo muito grande. Máximo: 100 MB.', 'erro');
    input.value = '';
    return;
  }

  _mostrarSpinnerDocs(true, 'Enviando arquivo...');

  if (file.size <= _UPLOAD_CHUNK_SIZE) {
    // Arquivo pequeno: envio único
    var reader = new FileReader();
    reader.onload = function(e) {
      google.script.run
        .withSuccessHandler(function(res) {
          _mostrarSpinnerDocs(false);
          input.value = '';
          if (res.sucesso) { mostrarToast('Arquivo enviado!', 'sucesso'); _docsCarregarLista(); }
          else              { mostrarToast('Erro: ' + res.mensagem, 'erro'); }
        })
        .withFailureHandler(function(err) {
          _mostrarSpinnerDocs(false);
          input.value = '';
          mostrarToast('Erro ao enviar: ' + err, 'erro');
        })
        .uploadDocumentoDrive(SESSAO_TOKEN, projetoId, file.name, e.target.result, file.type);
    };
    reader.readAsDataURL(file);
  } else {
    // Arquivo grande: upload em chunks
    var totalChunks = Math.ceil(file.size / _UPLOAD_CHUNK_SIZE);
    _setProgressoUpload(0, 'Iniciando envio...');

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res.sucesso) {
          _mostrarSpinnerDocs(false);
          input.value = '';
          mostrarToast('Erro ao iniciar upload: ' + res.mensagem, 'erro');
          return;
        }
        _enviarChunkLoop(projetoId, file, totalChunks, input, res.uploadId, res.folderId, 0);
      })
      .withFailureHandler(function(err) {
        _mostrarSpinnerDocs(false);
        input.value = '';
        mostrarToast('Erro ao iniciar upload: ' + err, 'erro');
      })
      .iniciarUploadChunked(SESSAO_TOKEN, projetoId);
  }
}

function _setProgressoUpload(percent, texto) {
  var bar  = document.getElementById('docsUploadProgressBar');
  var fill = document.getElementById('docsUploadProgressFill');
  var txt  = document.getElementById('docsUploadProgressTexto');
  if (bar)  bar.style.display = percent >= 0 ? 'block' : 'none';
  if (fill) fill.style.width  = percent + '%';
  if (txt)  txt.textContent   = texto;
}

function _enviarChunkLoop(projetoId, file, totalChunks, input, uploadId, folderId, idx) {
  if (idx >= totalChunks) {
    // Todos os chunks enviados — finalizar
    _setProgressoUpload(99, 'Montando arquivo...');
    google.script.run
      .withSuccessHandler(function(res) {
        _mostrarSpinnerDocs(false);
        input.value = '';
        if (res.sucesso) { mostrarToast('Arquivo enviado!', 'sucesso'); _docsCarregarLista(); }
        else              { mostrarToast('Erro ao finalizar: ' + res.mensagem, 'erro'); }
      })
      .withFailureHandler(function(err) {
        _mostrarSpinnerDocs(false);
        input.value = '';
        mostrarToast('Erro ao finalizar: ' + err, 'erro');
      })
      .finalizarUploadChunked(SESSAO_TOKEN, uploadId, totalChunks, folderId, file.name, file.type);
    return;
  }

  var start = idx * _UPLOAD_CHUNK_SIZE;
  var chunk = file.slice(start, Math.min(start + _UPLOAD_CHUNK_SIZE, file.size));
  var pct   = Math.round((idx / totalChunks) * 95);
  _setProgressoUpload(pct, 'Parte ' + (idx + 1) + ' de ' + totalChunks + '...');

  var reader = new FileReader();
  reader.onload = function(e) {
    // readAsDataURL retorna "data:...;base64,<dados>" — enviar só o base64
    var base64 = e.target.result.split(',')[1];
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res.sucesso) {
          _mostrarSpinnerDocs(false);
          input.value = '';
          mostrarToast('Erro na parte ' + (idx + 1) + ': ' + res.mensagem, 'erro');
          return;
        }
        _enviarChunkLoop(projetoId, file, totalChunks, input, uploadId, folderId, idx + 1);
      })
      .withFailureHandler(function(err) {
        _mostrarSpinnerDocs(false);
        input.value = '';
        mostrarToast('Erro na parte ' + (idx + 1) + ': ' + err, 'erro');
      })
      .enviarChunkUpload(SESSAO_TOKEN, uploadId, idx, base64);
  };
  reader.readAsDataURL(chunk);
}

function _iconeArquivoDrive(mimeType) {
  if (!mimeType) return 'file';
  if (mimeType.includes('pdf'))                                              return 'file-pdf';
  if (mimeType.startsWith('image/'))                                         return 'file-image';
  if (mimeType.includes('word') || mimeType.includes('document'))            return 'file-word';
  if (mimeType.includes('sheet') || mimeType.includes('excel') || mimeType.includes('spreadsheet')) return 'file-excel';
  if (mimeType.includes('presentation') || mimeType.includes('powerpoint')) return 'file-powerpoint';
  if (mimeType.startsWith('text/') || mimeType === 'application/json')      return 'file-alt';
  if (mimeType.includes('zip') || mimeType.includes('compressed'))           return 'file-archive';
  return 'file';
}

function _formatarTamanhoArquivo(bytes) {
  if (!bytes || bytes === 0) return '—';
  if (bytes < 1024)     return bytes + ' B';
  if (bytes < 1048576)  return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

/** Estado local do visualizador de atas */
var _atasProjetoEstado = {
  reunioes: [],
  reuniaoAtiva: null,
  tabAtiva: 'ata',
  tabFocoAtiva: 'atas'
};

/** Abre o modal de atas para o projeto informado */
function abrirModalAtasProjeto(projetoId, nomeProjeto, event) {
  if (event) event.stopPropagation();

  var modal = document.getElementById('modalAtasProjeto');
  var titulo = document.getElementById('modalAtasProjetoTitulo');
  var lista  = document.getElementById('catalogoAtasProjetoLista');
  var badge  = document.getElementById('badgeContadorAtasProjeto');

  if (!modal) return;

  if (titulo) titulo.textContent = 'Atas — ' + nomeProjeto;
  if (lista)  lista.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Carregando reuniões...</p></div>';
  if (badge)  badge.textContent = '0';

  // Resetar viewer
  _resetarViewerAtas();

  if (!modal.classList.contains('visible')) {
    modal.classList.add('visible');
    _bloquearScrollPagina();
  }

  // Buscar dados no backend
  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(function(res) {
        _atasProjetoEstado.reunioes = (res && res.reunioes) ? res.reunioes : [];
        if (badge) badge.textContent = _atasProjetoEstado.reunioes.length;
        _renderizarCatalogoAtasProjeto(_atasProjetoEstado.reunioes, lista);
      })
      .withFailureHandler(function(err) {
        if (lista) lista.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Erro ao carregar: ' + err + '</p></div>';
      })
      .obterReunioesDoProjeto(projetoId);
  } else {
    // modo demo
    _atasProjetoEstado.reunioes = [];
    if (lista) lista.innerHTML = '<div class="empty-state"><i class="fas fa-info-circle"></i><p>Nenhuma reunião encontrada (modo offline)</p></div>';
  }
}

/** Fecha o modal de atas */
function fecharModalAtasProjeto() {
  var modal = document.getElementById('modalAtasProjeto');
  if (modal && modal.classList.contains('visible')) {
    modal.classList.remove('visible');
    _desbloquearScrollPagina();
  }
  _atasProjetoEstado.reuniaoAtiva = null;
}

/** Renderiza o catálogo de reuniões no painel esquerdo do modal */
function _renderizarCatalogoAtasProjeto(reunioes, container) {
  if (!container) return;
  if (!reunioes || reunioes.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times"></i><p>Nenhuma reunião vinculada a este projeto</p></div>';
    return;
  }

  var html = '';
  reunioes.forEach(function(r) {
    var dataFormatada = r.data ? _formatarDataAta(r.data) : '—';
    html += '<div class="ata-catalogo-item" data-reuniao-id="' + r.id + '" onclick="_selecionarReuniaoAta(\'' + r.id + '\')">';
    html += '<div class="ata-catalogo-item-titulo"><i class="fas fa-video"></i> ' + _escaparHtml(r.titulo) + '</div>';
    html += '<div class="ata-catalogo-item-meta">';
    html += '<span><i class="fas fa-calendar-alt"></i> ' + dataFormatada + '</span>';
    if (r.duracao) html += '<span><i class="fas fa-clock"></i> ' + _escaparHtml(r.duracao) + '</span>';
    html += '</div>';
    html += '<div class="ata-catalogo-item-badges">';
    html += r.temAta ? '<span class="badge-doc tem"><i class="fas fa-file-lines"></i> Ata</span>' : '<span class="badge-doc nao"><i class="fas fa-file-lines"></i> Sem ata</span>';
    html += r.temTranscricao ? '<span class="badge-doc tem"><i class="fas fa-microphone"></i> Transcrição</span>' : '';
    html += '</div>';
    html += '</div>';
  });

  container.innerHTML = html;
}

/** Seleciona uma reunião e exibe no visualizador */
function _selecionarReuniaoAta(reuniaoId) {
  var reuniao = _atasProjetoEstado.reunioes.find(function(r) { return r.id === reuniaoId; });
  if (!reuniao) return;

  _atasProjetoEstado.reuniaoAtiva = reuniao;

  // Destacar item ativo
  var itens = document.querySelectorAll('.ata-catalogo-item');
  itens.forEach(function(el) {
    el.classList.toggle('ativo', el.dataset.reuniaoId === reuniaoId);
  });

  // Atualizar header do viewer
  var viewerTitulo = document.getElementById('atasViewerTitulo');
  var viewerTabs   = document.getElementById('atasViewerTabs');
  if (viewerTitulo) viewerTitulo.textContent = reuniao.titulo;
  if (viewerTabs)   viewerTabs.style.display = 'flex';

  // Exibir conteúdo da aba ativa
  _exibirConteudoTabAtas(_atasProjetoEstado.tabAtiva);
}

/** Troca aba no visualizador de atas (Ata / Transcrição) */
function trocarTabAtasViewer(btn, tab) {
  _atasProjetoEstado.tabAtiva = tab;

  var tabs = document.querySelectorAll('.modal-atas-viewer-tabs .atas-tab');
  tabs.forEach(function(t) { t.classList.toggle('ativo', t.dataset.tab === tab); });

  _exibirConteudoTabAtas(tab);
}

/** Exibe o conteúdo (ata ou transcrição) no viewer */
function _exibirConteudoTabAtas(tab) {
  var corpo   = document.getElementById('atasViewerCorpo');
  var reuniao = _atasProjetoEstado.reuniaoAtiva;
  if (!corpo || !reuniao) return;

  var conteudo = tab === 'ata' ? reuniao.ata : reuniao.transcricao;

  if (!conteudo || conteudo.trim().length === 0) {
    corpo.innerHTML = '<div class="ata-vazia-viewer"><i class="fas fa-file-slash"></i><p>' +
      (tab === 'ata' ? 'Ata não disponível para esta reunião' : 'Transcrição não disponível para esta reunião') +
      '</p></div>';
    return;
  }

  // Renderizar como HTML se for markdown-like, ou texto puro
  var htmlConteudo = conteudo.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Converter markdown básico: **negrito**, # títulos, - lista
  htmlConteudo = htmlConteudo
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\n/g, '<br>');

  corpo.innerHTML = '<div class="atas-viewer-html">' + htmlConteudo + '</div>';
}

/** Reseta o viewer para o estado inicial */
function _resetarViewerAtas() {
  var viewerTitulo = document.getElementById('atasViewerTitulo');
  var viewerTabs   = document.getElementById('atasViewerTabs');
  var viewerCorpo  = document.getElementById('atasViewerCorpo');
  if (viewerTitulo) viewerTitulo.textContent = 'Nenhuma reunião selecionada';
  if (viewerTabs)   viewerTabs.style.display = 'none';
  if (viewerCorpo)  viewerCorpo.innerHTML = '<div class="ata-vazia-viewer"><i class="fas fa-book-open"></i><p>Selecione uma reunião no catálogo ao lado para visualizar a ata</p></div>';
  _atasProjetoEstado.reuniaoAtiva = null;
  _atasProjetoEstado.tabAtiva = 'ata';
}

/** Renderiza a lista de documentos no painel do Modo Foco */
function _renderizarDocListaFoco(reunioes, container, tab) {
  if (!container) return;

  var filtradas = tab === 'transcricoes'
    ? reunioes.filter(function(r) { return r.temTranscricao; })
    : reunioes.filter(function(r) { return r.temAta; });

  if (filtradas.length === 0) {
    container.innerHTML = '<div class="empty-state" style="font-size:0.8rem;"><i class="fas fa-calendar-times"></i><p>' +
      (tab === 'transcricoes' ? 'Nenhuma transcrição disponível' : 'Nenhuma ata disponível') +
      '</p></div>';
    return;
  }

  var html = '';
  filtradas.forEach(function(r) {
    var dataFmt = r.data ? _formatarDataAta(r.data) : '—';
    html += '<div class="modo-foco-doc-item" onclick="_abrirDocFoco(\'' + r.id + '\', \'' + (tab === 'transcricoes' ? 'transcricao' : 'ata') + '\')">';
    html += '<i class="fas fa-' + (tab === 'transcricoes' ? 'microphone' : 'file-lines') + '"></i>';
    html += '<div class="modo-foco-doc-item-info">';
    html += '<div class="modo-foco-doc-item-titulo">' + _escaparHtml(r.titulo) + '</div>';
    html += '<div class="modo-foco-doc-item-data">' + dataFmt + '</div>';
    html += '</div></div>';
  });

  container.innerHTML = html;
}

  if (!reuniao) return;

  var lista   = document.getElementById('modoFocoDocLista');
  var viewer  = document.getElementById('modoFocoDocViewer');
  var titulo  = document.getElementById('modoFocoDocViewerTitulo');
  var conteudoEl = document.getElementById('modoFocoDocViewerConteudo');

  if (lista)  lista.style.display = 'none';

  if (titulo) titulo.textContent = reuniao.titulo;

  var texto = tipoTab === 'transcricao' ? reuniao.transcricao : reuniao.ata;

  if (!texto || texto.trim().length === 0) {
    if (conteudoEl) conteudoEl.innerHTML = '<div class="ata-vazia-viewer"><i class="fas fa-file-slash"></i><p>Conteúdo não disponível</p></div>';
    return;
  }

  var htmlConteudo = texto.replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')

// ========================= UTILITÁRIOS =========================

function _formatarDataAta(dataStr) {
  try {
    var d = new Date(dataStr);
    if (isNaN(d.getTime())) return dataStr;
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch(e) { return dataStr; }
}

function _escaparHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========================= SHIMMER SEQUENCIAL BENTO =========================
(function initBentoShimmer() {
  const ORDER = [
    'bento-donut', 'bento-setor',
    'bento-prioridade', 'bento-tipo', 'bento-responsaveis'
  ];
  const DURATION = 2800; // ms — sincronizado com bento-spin 2.8s

  function start() {
    const cells = ORDER.map(cls => document.querySelector('.' + cls)).filter(Boolean);
    if (!cells.length) return;
    let idx = 0;
    function next() {
      cells.forEach(c => c.classList.remove('shimmer-active'));
      cells[idx].classList.add('shimmer-active');
      idx = (idx + 1) % cells.length;
      setTimeout(next, DURATION);
    }
    next();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();

    ctx.fillStyle = '#003a18'; ctx.font = '6px '+F;
    ctx.fillText('WASD  ou  SETAS  para  mover', W/2, 214);
    ctx.fillText('ESPACO  =  pausar', W/2, 230);

    if (G.hiScore > 0) {
      ctx.fillStyle = '#ffcc00'; ctx.font = '7px '+F;
      ctx.fillText('RECORDE:  ' + G.hiScore, W/2, 258);
    }

    _blink(ctx, W/2, 170, '>>  CLIQUE  PARA  JOGAR  <<', '#00cc44', '7px '+F);
  }

  // ── Partida ────────────────────────────────────────────────────────────────
  function _start() {
    _stop();
    if (G.canvas) G.canvas.onclick = null;
    G.state   = 'PLAYING';
    G.score   = 0;
    G.speed   = 260;
    var cx = Math.floor(G.COLS/2), cy = Math.floor(G.ROWS/2);
    G.snake   = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
    G.dir     = {x:1,y:0};
    G.nextDir = {x:1,y:0};
    _placeFood();
    _updateHUD();
    var ctrl = document.getElementById('snakeControls');
    if (ctrl) ctrl.style.display = 'block';
    var pb = document.getElementById('snakePauseBtn');
    if (pb) pb.textContent = '⏸';
    _render();
    G.loopId = setInterval(_step, G.speed);
  }
  window._snakeStart = _start;

  // ── Step ───────────────────────────────────────────────────────────────────
  function _step() {
    if (G.state !== 'PLAYING') return;
    G.dir = G.nextDir;
    var head = G.snake[0];
    var nh   = {x: head.x + G.dir.x, y: head.y + G.dir.y};

    if (nh.x < 0 || nh.x >= G.COLS || nh.y < 0 || nh.y >= G.ROWS) { _die(); return; }
    for (var i = 0; i < G.snake.length; i++) {
      if (G.snake[i].x === nh.x && G.snake[i].y === nh.y) { _die(); return; }
    }
    G.snake.unshift(nh);

    if (nh.x === G.food.x && nh.y === G.food.y) {
      G.score++;
      if (G.score > G.hiScore) G.hiScore = G.score;
      _updateHUD();
      _placeFood();
      _stop();
      G.speed = Math.max(G.MIN_SPEED, Math.round(G.speed * 0.84));
      G.loopId = setInterval(_step, G.speed);
    } else {
      G.snake.pop();
    }
    _render();
  }

  // ── Morte ──────────────────────────────────────────────────────────────────
  function _die() {
    _stop();
    G.state = 'DEAD';
    if (G.score > G.hiScore) G.hiScore = G.score;
    var ctrl = document.getElementById('snakeControls');
    if (ctrl) ctrl.style.display = 'none';
    var flashes = 0;
    var t = setInterval(function() {
      _render();
      if (flashes % 2 === 0) { G.ctx.fillStyle = 'rgba(255,0,0,0.22)'; G.ctx.fillRect(0,0,300,300); }
      if (++flashes >= 8) { clearInterval(t); _renderGameOver(); }
    }, 90);
  }

  function _renderGameOver() {
    var ctx = G.ctx, W = 300, H = 300;
    var F = '"Press Start 2P",monospace';
    _render();
    ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);

    ctx.shadowColor = '#ff3333'; ctx.shadowBlur = 18;
    ctx.fillStyle = '#ff3333'; ctx.font = 'bold 14px '+F; ctx.textAlign = 'center';
    ctx.fillText('GAME  OVER', W/2, H/2 - 46);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffcc00'; ctx.font = '8px '+F;
    ctx.fillText('PONTUACAO:  ' + G.score, W/2, H/2 - 20);

    if (G.score > 0 && G.score === G.hiScore) {
      ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 8;
      ctx.fillStyle = '#00ffcc'; ctx.font = '7px '+F;
      ctx.fillText('★  NOVO  RECORDE!  ★', W/2, H/2 + 2);
      ctx.shadowBlur = 0;
    }

    var msg = G.score === 0 ? '...nem um ponto. Impressionante.'
            : G.score < 4   ? 'Tente novamente!'
            : G.score < 8   ? 'Quase la...'
            : G.score < 13  ? 'Bom! Mas da pra mais!'
            :                 'Voce e um lendario.';
    ctx.fillStyle = '#444'; ctx.font = '6px '+F;
    ctx.fillText(msg, W/2, H/2 + 18);

    if (G.canvas) G.canvas.onclick = _start;
    _blink(ctx, W/2, H/2 + 58, 'CLIQUE  PARA  TENTAR  NOVAMENTE', '#00cc44', '6px '+F);
  }

  // ── Pause ──────────────────────────────────────────────────────────────────
  function _pause() {
    _stop(); G.state = 'PAUSED';
    var ctx = G.ctx, W = 300, H = 300, F = '"Press Start 2P",monospace';
    ctx.fillStyle = 'rgba(0,0,0,0.62)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#00ff44'; ctx.font = 'bold 14px '+F; ctx.textAlign = 'center';
    ctx.fillText('PAUSADO', W/2, H/2 - 8);
    ctx.fillStyle = '#003318'; ctx.font = '6px '+F;
    ctx.fillText('clique  em  ▶  para  continuar', W/2, H/2 + 14);
    var pb = document.getElementById('snakePauseBtn');
    if (pb) pb.textContent = '▶';
  }

  function _resume() {
    if (G.state !== 'PAUSED') return;
    G.state = 'PLAYING';
    var pb = document.getElementById('snakePauseBtn');
    if (pb) pb.textContent = '⏸';
    G.loopId = setInterval(_step, G.speed);
  }

  window._snakeDirBtn = function(dx, dy) {
    if (G.state === 'PAUSED') { _resume(); return; }
    if (G.state !== 'PLAYING') return;
    if (!(dx === -G.dir.x && dy === -G.dir.y)) G.nextDir = {x:dx, y:dy};
  };
  window._snakePauseToggle = function() {
    if (G.state === 'PLAYING') _pause();
    else if (G.state === 'PAUSED') _resume();
  };

  // ── Render ─────────────────────────────────────────────────────────────────
  function _render() {
    var ctx = G.ctx, W = 300, H = 300, c = G.CELL;
    if (!ctx) return;
    ctx.fillStyle = '#010d01'; ctx.fillRect(0,0,W,H);
    _drawGrid(ctx, W, H);

    // Comida — maçã pixel art
    if (G.food) {
      var fx = G.food.x*c, fy = G.food.y*c;
      ctx.fillStyle = '#991500'; ctx.fillRect(fx+2, fy+5, c-4, c-6);
      ctx.fillStyle = '#cc2000'; ctx.fillRect(fx+2, fy+5, c-4, c-6);
      ctx.fillStyle = '#ff4422'; ctx.fillRect(fx+3, fy+6, 3, 3);
      ctx.fillStyle = '#660e00'; ctx.fillRect(fx+1, fy+7, 1, 3);
      ctx.fillStyle = '#1a5200'; ctx.fillRect(fx+c/2-1, fy+1, 2, 5);
      ctx.fillStyle = '#2a8800'; ctx.fillRect(fx+c/2+1, fy+2, 3, 2);
    }

    _drawSnakeSegs(ctx, G.snake, G.dir);
  }

  function _drawSnakeSegs(ctx, segs, dir) {
    var c = G.CELL;
    for (var i = segs.length-1; i >= 0; i--) {
      var sx = segs[i].x*c, sy = segs[i].y*c;
      if (i === 0) {
        ctx.fillStyle = '#3ddc6e'; ctx.fillRect(sx+1, sy+1, c-2, c-2);
        var e1 = {x:sx+3, y:sy+3}, e2 = {x:sx+c-6, y:sy+3};
        if (dir.x===1)  { e1={x:sx+c-5,y:sy+3};   e2={x:sx+c-5,y:sy+c-6}; }
        if (dir.x===-1) { e1={x:sx+2,y:sy+3};      e2={x:sx+2,y:sy+c-6}; }
        if (dir.y===-1) { e1={x:sx+3,y:sy+2};      e2={x:sx+c-6,y:sy+2}; }
        if (dir.y===1)  { e1={x:sx+3,y:sy+c-5};    e2={x:sx+c-6,y:sy+c-5}; }
        ctx.fillStyle = '#001800';
        ctx.fillRect(e1.x, e1.y, 2, 2);
        ctx.fillRect(e2.x, e2.y, 2, 2);
      } else {
        ctx.fillStyle = (i%2===0) ? '#186636' : '#115228';
        ctx.fillRect(sx+1, sy+1, c-2, c-2);
        ctx.fillStyle = (i%2===0) ? '#1e8844' : '#186636';
        ctx.fillRect(sx+3, sy+3, c-6, c-6);
      }
    }
  }

  function _drawGrid(ctx, W, H) {
    ctx.strokeStyle = '#0a1c0a'; ctx.lineWidth = 0.5;
    var c = G.CELL;
    for (var x=0; x<=W; x+=c) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (var y=0; y<=H; y+=c) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  function _blink(ctx, x, y, text, color, font) {
    if (G.blinkId) { clearInterval(G.blinkId); G.blinkId = null; }
    var vis = true;
    function draw() {
      if (!G.canvas || (G.state !== 'MENU' && G.state !== 'DEAD')) {
        clearInterval(G.blinkId); G.blinkId = null; return;
      }
      ctx.fillStyle = '#010d01'; ctx.fillRect(0, y-14, 300, 22);
      if (vis) { ctx.fillStyle = color; ctx.font = font; ctx.textAlign = 'center'; ctx.fillText(text, x, y); }
      vis = !vis;
    }
    G.blinkId = setInterval(draw, 560);
    draw();
  }

  function _placeFood() {
    var empty = [];
    for (var x=0; x<G.COLS; x++) for (var y=0; y<G.ROWS; y++) {
      var hit = false;
      for (var i=0; i<G.snake.length; i++) if (G.snake[i].x===x && G.snake[i].y===y) { hit=true; break; }
      if (!hit) empty.push({x:x,y:y});
    }
    if (!empty.length) { _die(); return; }
    G.food = empty[Math.floor(Math.random()*empty.length)];
  }

  function _updateHUD() {
    var s = document.getElementById('snakeScoreDisplay');
    var h = document.getElementById('snakeHiScore');
    if (s) s.textContent = G.score;
    if (h) h.textContent = G.hiScore;
  }

  function _stop() {
    if (G.loopId)  { clearInterval(G.loopId);  G.loopId  = null; }
    if (G.blinkId) { clearInterval(G.blinkId); G.blinkId = null; }
  }

})();

var _configPrioridadeAtual = null; // cache local enquanto o modal está aberto

function abrirModalConfigPrioridade() {
  var modal = document.getElementById('modalConfigPrioridade');

  modal.classList.add('visible');
  _configPrioridadeAtual = null;

  var corpo = document.getElementById('configPrioridadeCorpo');
  corpo.innerHTML = '<div class="empty-state"><i class="fas fa-mug-hot fa-spin"></i> Carregando configurações...</div>';

  var btnSalvar = document.getElementById('btnSalvarConfigPrioridade');
  if (btnSalvar) btnSalvar.disabled = true;

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r || !r.sucesso) {
        corpo.innerHTML = '<div class="empty-state erro"><i class="fas fa-exclamation-triangle"></i> ' + (r && r.mensagem ? r.mensagem : 'Erro ao carregar.') + '</div>';
        return;
      }
      _configPrioridadeAtual = r.config;
      _renderizarModalConfigPrioridade(r.config);
      if (btnSalvar) btnSalvar.disabled = false;
    })
    .withFailureHandler(function(err) {
      corpo.innerHTML = '<div class="empty-state erro"><i class="fas fa-exclamation-triangle"></i> Erro: ' + err.message + '</div>';
    })
    .obterConfigPrioridade(SESSAO_TOKEN);

function _restaurarPadroesPrioridade() {
  var inputs = document.querySelectorAll('#configPrioridadeCorpo input[data-chave]');
  inputs.forEach(function(inp) {
    var chave = inp.getAttribute('data-chave');
    if (_CONFIG_PRIORIDADE_DEFAULTS_JS[chave] !== undefined) {
      inp.value = _CONFIG_PRIORIDADE_DEFAULTS_JS[chave];
      inp.classList.remove('erro');
      inp.style.borderColor = '';
    }
  });
  mostrarToast('Valores restaurados para o padrão. Clique em Salvar para confirmar.', 'aviso');
}

function salvarConfigPrioridadeModal() {
  var inputs = document.querySelectorAll('#configPrioridadeCorpo input[data-chave]');
  if (!inputs.length) return;

  var config = {};
  var valido = true;
  inputs.forEach(function(inp) {
    var chave = inp.getAttribute('data-chave');
    var val   = parseFloat(inp.value);
    if (isNaN(val) || val < 0) {
      inp.classList.add('erro');
      valido = false;
    } else {
      inp.classList.remove('erro');
      config[chave] = val;
    }
  });

  if (!valido) {
    mostrarToast('Corrija os campos marcados em vermelho.', 'erro');
    return;
  }

  var btnSalvar = document.getElementById('btnSalvarConfigPrioridade');
  if (btnSalvar) {
    btnSalvar.disabled = true;
    btnSalvar.innerHTML = '<i class="fas fa-mug-hot fa-spin"></i> Salvando...';
  }

  google.script.run
    .withSuccessHandler(function(r) {
      if (btnSalvar) {
        btnSalvar.disabled = false;
        btnSalvar.innerHTML = '<i class="fas fa-save"></i> Salvar';
      }
      if (r && r.sucesso) {
        mostrarToast('Configuração salva! ☕', 'sucesso');
        fecharModalConfigPrioridade();
      } else {
        mostrarToast((r && r.mensagem) ? r.mensagem : 'Erro ao salvar.', 'erro');
      }
    })
    .withFailureHandler(function(err) {
      if (btnSalvar) {
        btnSalvar.disabled = false;
        btnSalvar.innerHTML = '<i class="fas fa-save"></i> Salvar';
      }
      mostrarToast('Erro: ' + err.message, 'erro');
    })
    .salvarConfigPrioridade(SESSAO_TOKEN, config);
}


</script>
