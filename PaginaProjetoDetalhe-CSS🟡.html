}
.btn-acao-icone:hover { background: var(--cor-primaria-bg); color: var(--cor-primaria); transform: scale(1.1); }
.btn-acao-perigo:hover { background: rgba(166,61,64,0.1) !important; color: var(--cor-perigo) !important; }
.btn-expandir-atv.ativo { color: var(--cor-primaria) !important; background: var(--cor-primaria-bg) !important; }

.badge-status-clicavel { cursor: pointer; user-select: none; transition: filter 0.15s, transform 0.1s; }
.badge-status-clicavel:hover { filter: brightness(1.15); transform: scale(1.05); }

/* Conteúdo expandível */
.atividade-conteudo-corpo {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  background: var(--cor-fundo-quente);
  border-top: 0 solid var(--cor-borda-clara);
}
.atividade-conteudo-corpo.visivel {
  max-height: 500px; padding: 10px 12px; border-top-width: 1px;
}
.atividade-oQueFazer {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 0.8rem; color: var(--cor-texto); line-height: 1.55;
}
.atividade-oQueFazer i { color: var(--cor-primaria); margin-top: 3px; flex-shrink: 0; font-size: 0.72rem; }

.atividades-dica-drag {
  font-size: 0.68rem; color: var(--cor-texto-secundario); font-style: italic;
  display: flex; align-items: center; gap: 4px;
}
.atividades-dica-drag i { font-size: 0.62rem; color: var(--cor-primaria-clara); }

.atividades-empty-proj {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; padding: 30px 20px; color: var(--cor-texto-secundario);
  font-size: 0.82rem; text-align: center;
}
.atividades-empty-proj i { font-size: 2rem; opacity: 0.4; }

/* ── Botão alternância de tema ── */
.btn-tema-toggle {
  background: rgba(250, 246, 238, 0.1) !important;
  border: 1px solid rgba(250, 246, 238, 0.25) !important;
  transition: var(--transicao);
}
.btn-tema-toggle:hover {
  background: rgba(250, 246, 238, 0.22) !important;
  transform: scale(1.04);
}

/* =====================================================================
   MODAL ATAS DO PROJETO
===================================================================== */
.modal-atas-content {
  max-width: 92vw;
  width: 1100px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
}

.modal-atas-body {
  display: grid;
  grid-template-columns: 320px 1fr;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  border-top: 1px solid var(--cor-borda-clara);
}

/* Coluna esquerda: catálogo */
.modal-atas-catalogo {
  border-right: 1px solid var(--cor-borda-clara);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--cor-fundo);
}

.modal-atas-catalogo-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--cor-texto-secundario);
  border-bottom: 1px solid var(--cor-borda-clara);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  flex-shrink: 0;
}

.modal-atas-catalogo-lista {
  overflow-y: auto;
  flex: 1;
  padding: 8px;
}

/* Item do catálogo */
.ata-catalogo-item {
  padding: 10px 12px;
  border-radius: var(--raio);
  cursor: pointer;
  border: 1px solid transparent;
  transition: var(--transicao);
  margin-bottom: 4px;
  background: var(--cor-fundo-card);
}

.ata-catalogo-item:hover {
  border-color: var(--cor-borda);
  background: var(--cor-fundo-quente);
}

.ata-catalogo-item.ativo {
  border-color: var(--cor-primaria);
  background: var(--cor-primaria-bg);
}

.ata-catalogo-item-titulo {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--cor-texto);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ata-catalogo-item-titulo i { color: var(--cor-primaria); font-size: 0.75rem; }

.ata-catalogo-item-meta {
  display: flex;
  gap: 10px;
  font-size: 0.72rem;
  color: var(--cor-texto-secundario);
  margin-bottom: 6px;
}

.ata-catalogo-item-badges {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.badge-doc {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 0.68rem;
  font-weight: 700;
}

.badge-doc.tem {
  background: rgba(90, 114, 71, 0.12);
  color: var(--cor-sucesso);
}

.badge-doc.nao {
  background: rgba(122, 101, 85, 0.08);
  color: var(--cor-texto-secundario);
}

/* Coluna direita: visualizador */
.modal-atas-visualizador {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--cor-fundo-card);
}

.modal-atas-viewer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--cor-borda-clara);
  flex-shrink: 0;
  background: var(--cor-fundo);
  flex-wrap: wrap;
}

.modal-atas-viewer-titulo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-titulo);
  font-size: 1rem;
  color: var(--cor-texto);
  flex: 1;
  min-width: 0;
}

.modal-atas-viewer-tabs {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.atas-tab {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border: 1px solid var(--cor-borda);
  border-radius: var(--raio);
  background: transparent;
  color: var(--cor-texto-secundario);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transicao);
  font-family: var(--font-corpo);
}

.atas-tab:hover {
  background: var(--cor-fundo);
  color: var(--cor-texto);
}

.atas-tab.ativo {
  background: var(--cor-primaria);
  border-color: var(--cor-primaria);
  color: #fffdf8;
}

.modal-atas-viewer-corpo {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  min-height: 0;
}

/* Viewer de conteúdo */
.atas-viewer-html {
  max-width: 780px;
  margin: 0 auto;
  font-size: 0.88rem;
  line-height: 1.8;
  color: var(--cor-texto);
}

.atas-viewer-html h2 {
  font-family: var(--font-titulo);
  font-size: 1.3rem;
  color: var(--cor-primaria-escura);
  margin: 1.5rem 0 0.6rem;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--cor-borda-clara);
}

.atas-viewer-html h3 {
  font-family: var(--font-titulo);
  font-size: 1.05rem;
  color: var(--cor-primaria);
  margin: 1.25rem 0 0.5rem;
}

.atas-viewer-html h4 {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--cor-texto);
  margin: 1rem 0 0.4rem;
}

.atas-viewer-html strong { color: var(--cor-primaria-escura); }
.atas-viewer-html em { color: var(--cor-texto-secundario); }

.atas-viewer-html li {
  margin-left: 20px;
  margin-bottom: 4px;
  list-style: disc;
}

.ata-vazia-viewer {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  gap: 12px;
  color: var(--cor-texto-secundario);
  text-align: center;
}

.ata-vazia-viewer i {
  font-size: 2.5rem;
  color: var(--cor-borda);
}

.ata-vazia-viewer p {
  font-size: 0.85rem;
  max-width: 280px;
}

/* Botão ver atas no card */
.projeto-card-atas-btn-wrap {
  padding-top: 8px;
  border-top: 1px solid var(--cor-borda-clara);
  margin-top: 4px;
}

.btn-ver-atas-projeto {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  background: var(--cor-destaque-bg);
  border: 1px solid rgba(184, 134, 11, 0.25);
  border-radius: var(--raio);
  color: var(--cor-destaque);
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transicao);
  font-family: var(--font-corpo);
}

.btn-ver-atas-projeto:hover {
  background: rgba(184, 134, 11, 0.18);
  border-color: var(--cor-destaque);
}

/* =====================================================================
   MODO FOCO — LAYOUT SPLIT
===================================================================== */
.modal-modo-foco-split {
  display: grid;
  grid-template-columns: 60% 40%;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* Esquerda: diagrama (mantém comportamento original) */
.modo-foco-esquerda {
  overflow-y: auto;
  padding: 24px;
  min-height: 0;
}

/* Direita: painel de documentos */
.modo-foco-documentos {
  border-left: 1px solid var(--cor-borda-clara);
  background: var(--cor-fundo);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.modo-foco-doc-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--cor-texto-secundario);
  border-bottom: 1px solid var(--cor-borda-clara);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  flex-shrink: 0;
}

.modo-foco-doc-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--cor-borda-clara);
  flex-shrink: 0;
}

.modo-foco-doc-lista {
  overflow-y: auto;
  flex: 1;
  padding: 8px;
}

.modo-foco-doc-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--raio);
  cursor: pointer;
  border: 1px solid var(--cor-borda-clara);
  transition: var(--transicao);
  margin-bottom: 6px;
  background: var(--cor-fundo-card);
}

.modo-foco-doc-item:hover {
  border-color: var(--cor-primaria);
  background: var(--cor-primaria-bg);
}

.modo-foco-doc-item > i {
  color: var(--cor-destaque);
  font-size: 1rem;
  flex-shrink: 0;
}

.modo-foco-doc-item-info { flex: 1; min-width: 0; }

.modo-foco-doc-item-titulo {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--cor-texto);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modo-foco-doc-item-data {
  font-size: 0.7rem;
  color: var(--cor-texto-secundario);
  margin-top: 2px;
}

/* Viewer dentro do Modo Foco */
.modo-foco-doc-viewer {
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  display: none;
}

.modo-foco-doc-viewer-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--cor-borda-clara);
  flex-shrink: 0;
}

.btn-voltar-lista {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border: 1px solid var(--cor-borda);
  border-radius: var(--raio);
  background: transparent;
  color: var(--cor-texto-secundario);
  font-size: 0.75rem;
  cursor: pointer;
  transition: var(--transicao);
  font-family: var(--font-corpo);
}

.btn-voltar-lista:hover {
  background: var(--cor-fundo);
  color: var(--cor-texto);
}

.modo-foco-doc-viewer-conteudo {
  overflow-y: auto;
  flex: 1;
  padding: 16px;
  font-size: 0.82rem;
  line-height: 1.7;
}

/* ========================= MODAL DOCUMENTOS DO DRIVE ========================= */

/* Modal container — override base .modal-content limits */
.modal-overlay#modalDocumentosDrive { align-items: center; padding: 4vh 4vw; }
.modal-docs-drive-content {
  max-width: 92vw !important;
  width: 92vw !important;
  max-height: 88vh !important;
  height: 88vh !important;
  display: flex !important;
  flex-direction: column;
  padding: 0;
  overflow: hidden;
  /* isolate stacking context — force repaint on open */
  isolation: isolate;
  will-change: transform;
}
.modal-docs-drive-content .modal-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--cor-borda-clara);
  flex-shrink: 0;
}

/* Spinner overlay interno */
.docs-drive-spinner-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex: 1;
  font-size: 0.88rem;
  color: var(--cor-texto-secundario);
  padding: 40px;
}
.docs-drive-spinner-overlay i { font-size: 2rem; color: var(--cor-destaque); }

/* Body split */
.modal-docs-drive-body {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
  /* force repaint so children are visible right after modal opens */
  transform: translateZ(0);
}

/* ── Painel esquerdo: lista ── */
.docs-drive-painel-lista {
  width: 290px;
  flex-shrink: 0;
  border-right: 1px solid var(--cor-borda-clara);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--cor-fundo);
}

.docs-drive-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 10px 10px 12px;
  border-bottom: 1px solid var(--cor-borda-clara);
  background: var(--cor-fundo-card);
  flex-shrink: 0;
  transform: translateZ(0); /* force own compositing layer */
  position: relative;
  z-index: 1;
}
.docs-upload-label {
  display: inline-flex; align-items: center; gap: 5px; cursor: pointer;
}
.btn-drive-ver-pasta {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border: 1px solid var(--cor-borda); border-radius: 6px;
  color: var(--cor-texto-secundario); text-decoration: none;
  font-size: 0.72rem; transition: var(--transicao); margin-left: auto;
}
.btn-drive-ver-pasta:hover { background: var(--cor-hover); color: var(--cor-texto); }

.docs-drive-lista-arquivos { flex: 1; overflow-y: auto; }

.drive-docs-carregando {
  padding: 14px 12px; font-size: 0.8rem; color: var(--cor-texto-secundario);
  display: flex; align-items: center; gap: 8px;
}

.drive-doc-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--cor-borda-clara);
  transition: background 0.12s; cursor: default;
}
.drive-doc-item:last-child { border-bottom: none; }
.drive-doc-item:hover { background: var(--cor-hover); }
.drive-doc-item.ativo { background: rgba(184,134,11,0.07); border-left: 3px solid var(--cor-destaque); padding-left: 7px; }

.drive-doc-icone { color: var(--cor-destaque); font-size: 0.9rem; flex-shrink: 0; width: 16px; text-align: center; }
.drive-doc-info  { flex: 1; min-width: 0; }
.drive-doc-nome  {
  display: block; font-size: 0.78rem; font-weight: 600; color: var(--cor-texto);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.drive-doc-meta  { font-size: 0.68rem; color: var(--cor-texto-secundario); }

.drive-doc-acoes { display: flex; gap: 3px; flex-shrink: 0; }
.btn-drive-acao {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px;
  border: 1px solid var(--cor-borda-clara); border-radius: 5px;
  background: transparent; color: var(--cor-texto-secundario);
  font-size: 0.68rem; cursor: pointer; text-decoration: none; transition: var(--transicao);
}
.btn-drive-acao:hover          { background: var(--cor-hover); color: var(--cor-texto); border-color: var(--cor-borda); }
.btn-drive-remover:hover       { background: rgba(220,38,38,0.08); color: #dc2626; border-color: rgba(220,38,38,0.3); }

.drive-docs-sem-pasta {
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 16px; text-align: center; gap: 6px;
}
.drive-docs-sem-pasta-icone { font-size: 2.4rem; color: var(--cor-texto-secundario); opacity: 0.35; }
.drive-docs-sem-pasta p     { font-size: 0.8rem; color: var(--cor-texto-secundario); margin: 0; }

.drive-docs-vazio {
  display: flex; flex-direction: column; align-items: center;
  padding: 28px; gap: 6px; color: var(--cor-texto-secundario); font-size: 0.8rem; opacity: 0.65;
}

/* ── Painel direito: viewer/editor ── */
.docs-drive-painel-viewer {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--cor-fundo);
}

.docs-viewer-placeholder {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: var(--cor-texto-secundario); opacity: 0.45; font-size: 0.85rem;
}
.docs-viewer-placeholder i { font-size: 2.8rem; }

.docs-viewer-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--cor-borda-clara);
  font-size: 0.8rem; font-weight: 600; color: var(--cor-texto);
  background: var(--cor-fundo-card); flex-shrink: 0;
}

/* ── Rich Text Editor ── */
.docs-editor-container {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: #f0ebe7;
}

/* Nome bar */
.docs-editor-nome-bar {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  border-bottom: 1px solid var(--cor-borda);
  background: var(--cor-fundo-card); flex-shrink: 0;
}
.docs-editor-nome-input {
  flex: 1; min-width: 0; padding: 6px 10px;
  border: 1px solid var(--cor-borda); border-radius: var(--raio);
  font-size: 0.85rem; background: var(--cor-fundo); color: var(--cor-texto);
  font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
}
.docs-editor-nome-input:focus { outline: none; border-color: var(--cor-destaque); }
.docs-btn-salvar { flex-shrink: 0; }

/* Toolbar */
.docs-editor-toolbar {
  display: flex; align-items: center; flex-wrap: wrap; gap: 2px;
  padding: 5px 10px; border-bottom: 1px solid var(--cor-borda);
  background: var(--cor-fundo-card); flex-shrink: 0;
  transform: translateZ(0); position: relative; z-index: 1;
}
.docs-tb-grupo {
  display: flex; align-items: center; gap: 1px;
}
.docs-tb-sep {
  width: 1px; height: 22px; background: var(--cor-borda);
  margin: 0 4px; flex-shrink: 0;
}
.docs-tb-btn {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border: 1px solid transparent;
  border-radius: 4px; background: transparent; cursor: pointer;
  color: var(--cor-texto); font-size: 0.82rem; transition: all 0.15s;
  flex-shrink: 0; padding: 0;
}
.docs-tb-btn:hover {
  background: var(--cor-fundo-quente); border-color: var(--cor-borda);
}
.docs-tb-btn.ativo {
  background: var(--cor-destaque-bg); border-color: var(--cor-destaque);
  color: var(--cafe-espresso);
}
.docs-tb-btn i { pointer-events: none; font-size: 0.78rem; }

/* Selects na toolbar */
.docs-tb-select {
  height: 28px; padding: 0 4px; border: 1px solid var(--cor-borda);
  border-radius: 4px; background: var(--cor-fundo); color: var(--cor-texto);
  font-size: 0.78rem; cursor: pointer; outline: none;
  font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
}
.docs-tb-select:focus { border-color: var(--cor-destaque); }
.docs-tb-font { width: 130px; }
.docs-tb-size { width: 56px; }
.docs-tb-block { width: 100px; }

/* Botões de cor (texto e marca-texto) */
.docs-color-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 28px; height: 28px; border: 1px solid transparent;
  border-radius: 4px; background: transparent; cursor: pointer;
  color: var(--cor-texto); font-size: 0.75rem; gap: 1px;
  position: relative; flex-shrink: 0; padding: 0;
  transition: all 0.15s;
}
.docs-color-btn:hover { background: var(--cor-fundo-quente); border-color: var(--cor-borda); }
.docs-color-btn i { font-size: 0.75rem; pointer-events: none; }
.docs-color-bar {
  width: 16px; height: 3px; border-radius: 1px; pointer-events: none;
}
.docs-color-btn input[type="color"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  width: 100%; height: 100%; border: none; padding: 0;
}

/* Régua */
.docs-editor-regua {
  height: 22px; background: #e8e0d8; border-bottom: 1px solid var(--cor-borda);
  flex-shrink: 0; position: relative; overflow: hidden;
}
.docs-editor-regua::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to right,
    transparent, transparent 9px,
    var(--cor-borda) 9px, var(--cor-borda) 10px
  );
  opacity: 0.5;
}

/* Scroll wrapper e área de página */
.docs-editor-scroll {
  flex: 1; overflow-y: auto; overflow-x: auto;
  background: #d8d0c8; padding: 24px 32px;
}

/* Área de edição — simula folha A4 */
.docs-editor-area {
